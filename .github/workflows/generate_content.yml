name: Preparar contenido de Instagram

on:
  schedule:
    - cron: "0 12 1,15 * *"   # el 1 y el 15 de cada mes, mantiene ~2 semanas de calendario cargadas
  workflow_dispatch:
    inputs:
      weeks:
        description: "Semanas de contenido a generar"
        required: false
        default: "2"

jobs:
  generate:
    runs-on: ubuntu-latest
    permissions:
      contents: write   # necesario para pushear las imágenes y el calendario actualizado
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - run: pip install -r requirements.txt

      - run: python generate_calendar.py --weeks "${{ github.event.inputs.weeks || '2' }}"

      - name: Guardar contenido generado
        run: |
          git config user.name "college.itools-bot"
          git config user.email "bot@users.noreply.github.com"
          git add content_calendar.csv generated_media/
          if ! git diff --staged --quiet; then
            git commit -m "Genera nuevo contenido para el calendario"
            git push
          else
            echo "Sin cambios, nada que guardar."
          fi
