name: Publicar en Instagram

on:
  schedule:
    - cron: "*/30 * * * *"   # cada 30 minutos
  workflow_dispatch:          # también permite ejecutarlo manualmente desde GitHub

jobs:
  publish:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - run: pip install -r requirements.txt

      - run: python scheduler.py
        env:
          IG_USER_ID: ${{ secrets.IG_USER_ID }}
          IG_ACCESS_TOKEN: ${{ secrets.IG_ACCESS_TOKEN }}

      - name: Guardar estado actualizado del calendario
        run: |
          git config user.name "college.itools-bot"
          git config user.email "bot@users.noreply.github.com"
          git add content_calendar.csv
          git diff --staged --quiet || git commit -m "Actualiza estado de publicaciones"
          git push
