name: Publicar en Instagram

on:
  schedule:
    - cron: "*/30 * * * *"   # cada 30 minutos
  workflow_dispatch:          # también permite ejecutarlo manualmente desde GitHub

jobs:
  publish:
    runs-on: ubuntu-latest
    permissions:
      contents: write   # necesario para que el bot pueda guardar (push) el estado del calendario
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - run: pip install -r requirements.txt

      - run: python scheduler.py
        env:
          IG_USER_ID: ${{ secrets.IG_USER_ID }}
          IG_ACCESS_TOKEN: ${{ secrets.IG_ACCESS_TOKEN }}

      - name: Guardar estado actualizado del calendario
        run: |
          git config user.name "college.itools-bot"
          git config user.email "bot@users.noreply.github.com"
          git add content_calendar.csv
          if ! git diff --staged --quiet; then
            git commit -m "Actualiza estado de publicaciones"
            git push
          else
            echo "Sin cambios en el calendario, nada que guardar."
          fi
